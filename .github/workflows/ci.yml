name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-template:
    name: Verify template
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js and Yarn
        uses: sena-nana/LiliaUI/.github/actions/setup-node-yarn@ae25c7b8ef6c6a9e38b6b64779d4ff085aa584bf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Verify template
        run: corepack yarn verify

      - name: Show sccache stats
        shell: pwsh
        run: "& $env:SCCACHE_PATH --show-stats"

  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js and Yarn
        uses: sena-nana/LiliaUI/.github/actions/setup-node-yarn@ae25c7b8ef6c6a9e38b6b64779d4ff085aa584bf

      - name: Build docs
        run: corepack yarn docs:build
